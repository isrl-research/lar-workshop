{% extends "base.html" %}
{% block title %} — New Product{% endblock %}
{% block content %}
<div class="page-header">
  <h1>New Product Declaration</h1>
  <p>Enter product details to begin declaring ingredients.</p>
</div>

<div class="card">
  <div class="card-body" style="max-width: 480px;">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Product name</label>
        <input type="text" name="name" required class="form-control"
          placeholder="e.g. Choco Cream Biscuit 200g">
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Brand</label>
        <input type="text" name="brand" required class="form-control"
          placeholder="e.g. Brand X">
      </div>
      <button type="submit" class="btn btn-primary">Save Product</button>
      <a href="/" class="btn btn-link text-muted ms-2">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
