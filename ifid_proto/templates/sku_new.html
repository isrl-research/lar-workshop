{% extends "base.html" %}
{% block title %} — New SKU{% endblock %}
{% block content %}
<h1 class="text-lg font-bold mb-6">New Product SKU</h1>
<form method="POST" class="space-y-4 max-w-sm">
  <div>
    <label class="block text-sm mb-1">Product name</label>
    <input type="text" name="name" required placeholder="e.g. Choco Cream Biscuit 200g"
      class="w-full border border-gray-300 rounded px-3 py-2 text-sm font-mono focus:outline-none focus:border-gray-600">
  </div>
  <div>
    <label class="block text-sm mb-1">Brand</label>
    <input type="text" name="brand" required placeholder="e.g. Brand X"
      class="w-full border border-gray-300 rounded px-3 py-2 text-sm font-mono focus:outline-none focus:border-gray-600">
  </div>
  <button type="submit" class="bg-gray-900 text-white text-sm px-4 py-2 rounded hover:bg-gray-700">Create SKU →</button>
</form>
{% endblock %}
