<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IFID Proto{% block title %}{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ['ui-monospace', 'SFMono-Regular', 'monospace'] }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 font-mono min-h-screen">
  <nav class="border-b border-gray-300 bg-white px-6 py-3 flex gap-6 text-sm font-semibold">
    <a href="/" class="hover:underline">IFID Proto</a>
    <a href="/taxonomy" class="hover:underline text-gray-500">Taxonomy</a>
    <a href="/breaks" class="hover:underline text-gray-500">Breaks</a>
  </nav>
  <main class="max-w-3xl mx-auto px-6 py-10">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
