<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IFID Proto{% block title %}{% endblock %}</title>
  <style>
    body { font-family: monospace; max-width: 900px; margin: 40px auto; padding: 0 20px; background: #fafafa; color: #111; }
    nav { border-bottom: 2px solid #111; padding-bottom: 8px; margin-bottom: 32px; }
    nav a { margin-right: 16px; text-decoration: none; color: #111; font-weight: bold; }
    nav a:hover { text-decoration: underline; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    h2 { font-size: 1.1rem; border-bottom: 1px solid #ccc; padding-bottom: 4px; }
    .break-tag { display: inline-block; background: #ffe0e0; border: 1px solid #c00; padding: 2px 6px; font-size: 0.8rem; border-radius: 2px; }
    .ok-tag { display: inline-block; background: #e0ffe0; border: 1px solid #060; padding: 2px 6px; font-size: 0.8rem; border-radius: 2px; }
    .meta { color: #555; font-size: 0.85rem; }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid #ddd; }
    th { background: #f0f0f0; }
    .btn { display: inline-block; padding: 6px 14px; background: #111; color: #fff; text-decoration: none; font-family: monospace; font-size: 0.9rem; }
    .btn:hover { background: #333; }
    .btn-sm { padding: 3px 8px; font-size: 0.8rem; }
    input[type=text], input[type=submit], select { font-family: monospace; padding: 6px; margin: 4px 0; }
    input[type=text], select { border: 1px solid #999; width: 100%; max-width: 400px; }
    input[type=submit] { background: #111; color: #fff; border: none; cursor: pointer; padding: 8px 16px; }
    .label-output { background: #fff; border: 1px solid #ccc; padding: 16px; font-size: 0.95rem; line-height: 1.6; }
    .section { margin-bottom: 32px; }
    details summary { cursor: pointer; font-weight: bold; }
    details { margin-bottom: 8px; }
  </style>
</head>
<body>
  <nav>
    <a href="/">IFID Proto</a>
    <a href="/taxonomy">Taxonomy</a>
    <a href="/breaks">Breaks</a>
  </nav>
  {% block content %}{% endblock %}
</body>
</html>
