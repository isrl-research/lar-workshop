{% extends "base.html" %}
{% block title_suffix %} — Add Category{% endblock %}
{% block content %}
<h1>Add category</h1>

<div class="card">
  <form method="POST">
    <label for="name">category-name</label>
    <input type="text" id="name" name="name"
           value="{{ form.name if form else '' }}"
           placeholder="e.g. raw-agricultural-material"
           autocomplete="off">
    <p class="hint">Auto-lowercased.</p>

    <button type="submit" class="btn">Insert category</button>
    <a href="/categories" class="btn btn-secondary" style="margin-left:0.5rem;">Cancel</a>
  </form>
</div>
{% endblock %}
